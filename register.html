<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TechNova 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header id="navbar">
        <div class="logo">TechNova <span>2026</span></div>
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <nav>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#details">Details</a></li>
                <li><a href="index.html#schedule">Schedule</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
        <label for="nav-toggle" class="hamburger">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </label>
    </header>

    <section class="contact"
        style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding-top: 100px;">
        <div class="form-container fade-in" style="width: 100%; margin-top: 40px;">
            <h2 style="margin-bottom: 30px;">Event Registration</h2>
            <form id="registration-form">
                <div class="input-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="Enter your full name" required>
                </div>
                <div class="input-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="Enter your email address" required>
                </div>
                <div class="input-group">
                    <label for="university">College / University</label>
                    <input type="text" id="university" placeholder="Enter your college name" required>
                </div>
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Complete Registration</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 TechNova College Event. All rights reserved.</p>
        <div class="socials">
            <a href="#">📘 Facebook</a>
            <a href="#">🐦 Twitter</a>
            <a href="#">📸 Instagram</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
